<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rondje Baarle Official®</title>
<meta name="description" content="Live wind- en weeradvies voor het Rondje Baarle. Ideale windscore, kledingadvies en 7-daagse voorspelling.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0c1220;--bg-mid:#111a2e;--bg-card:rgba(30,41,59,0.6);
  --bg-card-solid:#1a2538;--border:#1e293b;--border-light:#334155;
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,0.12);
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
  --green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;
  --header-bg:rgba(12,18,32,0.88);--body-bg:linear-gradient(180deg,#0c1220 0%,#162032 50%,#1a2744 100%);
  --map-filter:saturate(0.2) brightness(0.35) contrast(1.3);
  --card-blur:blur(12px);--logo-color:#fff;
}
[data-theme="light"]{
  --bg-deep:#f0f4f8;--bg-mid:#e8eef4;--bg-card:rgba(255,255,255,0.75);
  --bg-card-solid:#ffffff;--border:#d1d9e6;--border-light:#b8c4d4;
  --cyan:#0891b2;--cyan-dim:rgba(8,145,178,0.1);
  --text:#1e293b;--text-dim:#475569;--text-muted:#64748b;
  --green:#16a34a;--yellow:#ca8a04;--orange:#ea580c;--red:#dc2626;
  --header-bg:rgba(240,244,248,0.92);--body-bg:linear-gradient(180deg,#f0f4f8 0%,#e2eaf2 50%,#dce4ee 100%);
  --map-filter:saturate(0.8) brightness(0.95) contrast(1.05);
  --card-blur:blur(16px);--logo-color:#1e293b;
}
body{background:var(--body-bg);font-family:'Outfit',-apple-system,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.4s,color 0.3s}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);backdrop-filter:blur(16px);background:var(--header-bg);position:sticky;top:0;z-index:1000;transition:background 0.3s}
.logo-group{display:flex;align-items:center;gap:11px}
.logo-text-main{font-size:20px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;color:var(--logo-color);transition:color 0.3s}
.logo-text-sub{font-size:9.5px;font-weight:500;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase}
.logo-text-sub span{color:var(--cyan)}
.header-right{display:flex;align-items:center;gap:14px}
.route-meta{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.3s}
.theme-toggle:hover{border-color:var(--cyan);background:var(--cyan-dim)}
.datetime-banner{padding:14px 20px;text-align:center}
.datetime-display{font-size:20px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;letter-spacing:-0.01em;text-transform:capitalize}
.datetime-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.container{max-width:820px;margin:0 auto;padding:0 14px}
.day-selector{display:flex;gap:5px;padding:6px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.day-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);font-size:12px;font-weight:400;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;transition:all 0.2s}
.day-btn.active{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);font-weight:600}
.hour-selector{display:flex;gap:1px;padding:0 0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.hour-btn{padding:4px 0;min-width:28px;border-radius:4px;border:none;background:transparent;color:var(--text-muted);font-size:10px;font-weight:400;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.15s;text-align:center}
.hour-btn.tick{background:var(--bg-card)}
.hour-btn.active{background:var(--cyan);color:var(--bg-deep);font-weight:700}
.map-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--border);position:relative;box-shadow:0 4px 24px rgba(0,0,0,0.15);transition:border-color 0.3s}
#map{height:52vh;min-height:350px;max-height:520px;width:100%;background:var(--bg-mid)}
.leaflet-tile-pane{filter:var(--map-filter);transition:filter 0.4s}
#windCanvas{position:absolute;top:0;left:0;z-index:500;pointer-events:none;width:100%;height:100%}
.map-overlay{position:absolute;z-index:800;background:var(--bg-card);backdrop-filter:var(--card-blur);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--text-dim);pointer-events:none;transition:background 0.3s}
.map-legend{bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px}
.map-legend-row{display:flex;align-items:center;gap:8px}
.legend-line{width:22px;height:3px;border-radius:2px}
.wind-bar{top:12px;left:12px;display:flex;align-items:center;gap:8px}
.wind-bar span{font-family:'JetBrains Mono',monospace}
.wind-gradient-bar{height:5px;width:90px;border-radius:3px;background:linear-gradient(90deg,#4ade80,#facc15,#f97316,#ef4444)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:560px){.stats-grid{grid-template-columns:1fr}}
.stat-card{background:var(--bg-card);backdrop-filter:var(--card-blur);border-radius:14px;padding:18px 16px;border:1px solid var(--border);transition:all 0.3s}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px}
.stat-big{font-size:38px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:3px}
.stat-detail{font-size:11px;color:var(--text-muted);margin-top:6px}
.stat-detail-row{display:flex;align-items:center;gap:4px;margin-top:2px}
.compass-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.compass-label{font-size:14px;font-weight:600;color:var(--cyan)}
.compass-deg{font-size:10px;color:var(--text-muted)}
.clothing-card{margin-top:14px;background:var(--bg-card);backdrop-filter:var(--card-blur);border-radius:14px;padding:22px 20px;border:1px solid var(--border);transition:all 0.3s}
.clothing-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.clothing-text{flex:1 1 280px}
.clothing-category{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.clothing-desc{font-size:13px;color:var(--text-dim);line-height:1.65;margin-bottom:14px}
.clothing-tags{display:flex;flex-wrap:wrap;gap:5px}
.clothing-tag{padding:3px 10px;background:var(--cyan-dim);border:1px solid rgba(6,182,212,0.18);border-radius:6px;font-size:11px;color:var(--cyan);font-weight:500}
.cyclist-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center}
.footer{text-align:center;padding:20px 0 28px;font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.footer a{color:var(--cyan)}
.loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:14px;font-size:13px;color:var(--text-dim)}
::-webkit-scrollbar{height:4px;width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp 0.4s ease-out both}.a1{animation-delay:0.05s}.a2{animation-delay:0.1s}.a3{animation-delay:0.15s}.a4{animation-delay:0.2s}
</style>
</head>

function drawRoute(){
  routeLayers.forEach(function(l){map.removeLayer(l)});routeLayers=[];
  if(routeCoords.length===0)return;
  var w=getWeather(selectedDay,selectedHour);var wd=w?w.windDir:220;var ws=w?w.windSpeed:5;
  var si=Math.floor(routeCoords.length*SHELTERED_FRAC);
  var step=Math.max(1,Math.floor(routeCoords.length/120));
  for(var i=0;i<routeCoords.length-step;i+=step){
    var end=Math.min(i+step+1,routeCoords.length);var seg=routeCoords.slice(i,end);
    var p1=routeCoords[i],p2=routeCoords[Math.min(i+step,routeCoords.length-1)];
    var h=bearing(p1[0],p1[1],p2[0],p2[1]);var ad=angleDiff(wd,h);var tw=Math.cos(ad*Math.PI/180);
    var col=tw>0.3?'#22c55e':tw>-0.3?'#eab308':'#ef4444';
    var sh=i>=si;
    routeLayers.push(L.polyline(seg,{color:col,weight:sh?3:4.5,opacity:sh?0.5:0.85,lineCap:'round',lineJoin:'round'}).addTo(map));

}

  var sc=ws<5?[74,222,128]:ws<10?[250,204,21]:ws<15?[249,115,22]:[239,68,68];

function calcScore(wd,ws){
  if(routeCoords.length<2)return 50;var ts=0,tw2=0,si=Math.floor(routeCoords.length*SHELTERED_FRAC);
  var step=Math.max(1,Math.floor(routeCoords.length/80));
  for(var i=0;i<routeCoords.length-step;i+=step){
    var p1=routeCoords[i],p2=routeCoords[Math.min(i+step,routeCoords.length-1)];
    var h=bearing(p1[0],p1[1],p2[0],p2[1]),ad=angleDiff(wd,h),tw=Math.cos(ad*Math.PI/180);
    var ss=(tw+1)/2,sh=i>=si;if(sh)ss=0.5+(ss-0.5)*0.4;
    var pen=ws>8?(ws-8)*0.01*(1-tw)*(sh?0.3:1):0;ss=Math.max(0,ss-pen);
    var wt=sh?0.6:1;ts+=ss*wt;tw2+=wt}
  return Math.max(0,Math.min(100,Math.round((ts/tw2)*100)))
}

  return'<svg viewBox="0 0 240 180" width="190" height="145" xmlns="http://www.w3.org/2000/svg"><style>@keyframes pedal{from{transform:rotate(0)}to{transform:rotate(360deg)}}@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}.pedaling{animation:pedal 1.2s linear infinite;transform-origin:108px 132px}.body-bob{animation:bob 0.6s ease-in-out infinite}</style><circle cx="62" cy="132" r="32" fill="none" stroke="var(--text-muted)" stroke-width="2.2"/><circle cx="62" cy="132" r="4" fill="var(--text-dim)"/>'+rs+'<circle cx="172" cy="132" r="32" fill="none" stroke="var(--text-muted)" stroke-width="2.2"/><circle cx="172" cy="132" r="4" fill="var(--text-dim)"/>'+fs+'<g stroke="var(--text-muted)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="62" y1="132" x2="108" y2="88"/><line x1="108" y1="88" x2="148" y2="88"/><line x1="148" y1="88" x2="172" y2="132"/><line x1="62" y1="132" x2="120" y2="132"/><line x1="120" y1="132" x2="148" y2="88"/><line x1="108" y1="88" x2="102" y2="68"/><line x1="148" y1="88" x2="158" y2="72"/></g><ellipse cx="101" cy="65" rx="14" ry="4.5" fill="var(--border-light)"/><path d="M155 70Q162 62 168 66" fill="none" stroke="var(--text-muted)" stroke-width="3" stroke-linecap="round"/><g class="pedaling"><line x1="108" y1="132" x2="108" y2="148" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round"/><line x1="108" y1="132" x2="108" y2="116" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round"/><rect x="103" y="146" width="10" height="3" rx="1" fill="var(--text-dim)"/><rect x="103" y="113" width="10" height="3" rx="1" fill="var(--text-dim)"/></g><g class="body-bob"><g class="pedaling"><path d="M108 148Q95 138 92 120Q90 110 100 95" fill="none" stroke="#d4a574" stroke-width="4" stroke-linecap="round"/><path d="M108 116Q118 125 120 135Q122 142 115 95" fill="none" stroke="#d4a574" stroke-width="4" stroke-linecap="round"/></g><path d="M103 68Q115 60 140 55Q150 53 158 58" fill="none" stroke="'+col+'" stroke-width="8" stroke-linecap="round"/><path d="M115 63Q130 57 145 55" fill="none" stroke="'+col+'" stroke-width="6" stroke-linecap="round" opacity="0.7"/><path d="M145 56Q155 58 162 64" fill="none" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round"/><path d="M108 66Q112 68 118 64" fill="none" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/><line x1="148" y1="54" x2="152" y2="46" stroke="#d4a574" stroke-width="3.5" stroke-linecap="round"/><ellipse cx="155" cy="42" rx="9" ry="8" fill="#d4a574"/><path d="M144 38Q148 28 162 30Q170 32 168 38Q165 42 155 44Q147 43 144 38Z" fill="var(--border)"/><line x1="150" y1="32" x2="152" y2="36" stroke="var(--border-light)" stroke-width="0.8"/><line x1="155" y1="31" x2="157" y2="35" stroke="var(--border-light)" stroke-width="0.8"/><line x1="160" y1="32" x2="161" y2="36" stroke="var(--border-light)" stroke-width="0.8"/><path d="M149 41Q155 39 163 41" fill="none" stroke="var(--bg-deep)" stroke-width="2" stroke-linecap="round"/><g class="pedaling"><ellipse cx="108" cy="150" rx="6" ry="2.5" fill="var(--border)"/><ellipse cx="108" cy="114" rx="6" ry="2.5" fill="var(--border)"/></g></g></svg>'
}

function updateUI(){
  var w=getWeather(selectedDay,selectedHour);if(!w)return;
  startWind(w.windDir,w.windSpeed);if(routeCoords.length>0)drawRoute();
  var sc=calcScore(w.windDir,w.windSpeed);var scCol=sc>=70?'var(--green)':sc>=40?'var(--yellow)':'var(--red)';
  var scLbl=sc>=80?'Uitstekend':sc>=60?'Goed':sc>=40?'Matig':sc>=20?'Ongunstig':'Slecht';
  var el=document.getElementById('windScore');el.textContent=sc+'%';el.style.color=scCol;
  var sl=document.getElementById('windScoreLabel');sl.textContent=scLbl;sl.style.color=scCol;
  document.getElementById('tempDisplay').textContent=Math.round(w.temp*10)/10+'°';
  document.getElementById('feelsLike').textContent='Voelt als '+Math.round(w.feelsLike*10)/10+'°';
  document.getElementById('weatherDetail').innerHTML='<div class="stat-detail-row">☁️ '+w.clouds+'% bewolking</div><div class="stat-detail-row">💧 '+w.humidity+'% luchtvochtigheid</div>'+(w.rain>0?'<div class="stat-detail-row">🌧️ '+w.rain+' mm neerslag</div>':'');
  document.getElementById('windSpeed').textContent=(Math.round(w.windSpeed*10)/10).toString();
  document.getElementById('windGust').textContent='Windstoten: '+Math.round(w.windGust*10)/10+' m/s';
  var dirs=['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
  document.getElementById('windDirLabel').textContent=dirs[Math.round(w.windDir/22.5)%16];
  document.getElementById('windDirDeg').textContent=Math.round(w.windDir)+'°';
  document.getElementById('compassNeedle').setAttribute('transform','rotate('+w.windDir+',16,16)');
  var c=getClothing(w.temp,w.feelsLike,w.windSpeed);
  document.getElementById('clothingCategory').textContent=c.icon+' '+c.cat;document.getElementById('clothingCategory').style.color=c.color;
  document.getElementById('clothingDesc').textContent=c.desc;
  document.getElementById('clothingTags').innerHTML=c.tags.map(function(t){return'<span class="clothing-tag">'+t+'</span>'}).join('');
  document.getElementById('cyclistWrap').innerHTML=getCyclistSVG(c.color);
}

function bearing(a,b,c,d){var dl=(d-b)*Math.PI/180;var y=Math.sin(dl)*Math.cos(c*Math.PI/180);var x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.cos(dl);return((Math.atan2(y,x)*180/Math.PI)+360)%360}
function angleDiff(a,b){var d=Math.abs(a-b)%360;return d>180?360-d:d}
</script>
